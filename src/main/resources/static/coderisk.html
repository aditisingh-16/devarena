<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevArena - Code Risk Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --card: rgba(255,255,255,0.03);
            --border: rgba(157,78,221,0.2);
            --purple: #9d4edd;
            --cyan: #00d4ff;
            --green: #00ff88;
            --yellow: #ffd700;
            --text: #e2e8f0;
            --muted: #4a5568;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: linear-gradient(rgba(157,78,221,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(157,78,221,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.08; pointer-events: none; }
        .orb1 { width: 400px; height: 400px; background: var(--purple); top: -100px; left: -100px; }
        .orb2 { width: 300px; height: 300px; background: var(--cyan); bottom: -100px; right: -100px; }

        .navbar { position: relative; z-index: 10; background: rgba(8,12,20,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; background: linear-gradient(135deg, var(--cyan), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .back-btn { padding: 7px 16px; background: transparent; border: 1px solid var(--border); color: var(--purple); border-radius: 6px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 2px; transition: all 0.3s; }
        .back-btn:hover { background: var(--purple); color: #fff; }

        .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 50px 20px; }
        .page-header { margin-bottom: 36px; }
        .page-tag { font-size: 0.65rem; letter-spacing: 4px; color: var(--purple); text-transform: uppercase; margin-bottom: 10px; }
        .page-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; }
        .page-sub { color: var(--muted); font-size: 0.8rem; margin-top: 8px; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; backdrop-filter: blur(10px); }
        select { width: 100%; padding: 12px 16px; background: rgba(157,78,221,0.03); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; outline: none; margin-bottom: 16px; cursor: pointer; }
        select option { background: #080c14; }
        textarea { width: 100%; height: 240px; padding: 16px; background: #0a0e1a; border: 1px solid var(--border); border-radius: 8px; color: #c792ea; font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; outline: none; resize: vertical; margin-bottom: 16px; line-height: 1.7; }
        textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px rgba(157,78,221,0.1); }
        textarea::placeholder { color: var(--muted); }
        .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--purple), #6a0dad); border: none; border-radius: 8px; color: #fff; font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; letter-spacing: 3px; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(157,78,221,0.3); }

        .result { display: none; margin-top: 24px; background: #0a0e1a; border: 1px solid rgba(157,78,221,0.3); border-left: 4px solid var(--purple); border-radius: 10px; padding: 24px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .result-title { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 2px; color: var(--purple); margin-bottom: 16px; }
        .result-text { color: #c9d1d9; font-size: 0.83rem; line-height: 1.9; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/dashboard.html'">DEVARENA</div>
        <button class="back-btn" onclick="window.location.href='/dashboard.html'">← BACK</button>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="page-tag">// Module 03</div>
            <div class="page-title">🔮 CODE RISK ANALYZER</div>
            <div class="page-sub">AI predicts which edge cases will fail before you submit.</div>
        </div>

        <div class="card">
            <select id="codeLanguage">
                <option value="java">Java</option>
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="c++">C++</option>
                <option value="c">C</option>
            </select>
            <textarea id="codeInput" placeholder="// paste your code here..."></textarea>
            <button class="btn" onclick="analyzeCodeRisk()">🔮 ANALYZE RISKS</button>

            <div class="result" id="codeRiskResult">
                <div class="result-title">⚠ RISK ANALYSIS REPORT</div>
                <div class="result-text" id="riskText"></div>
            </div>
        </div>
    </div>

    <script>
        const loggedInUser = localStorage.getItem('loggedInUser');
        if (!loggedInUser) window.location.href = '/index.html';

        async function analyzeCodeRisk() {
            const code = document.getElementById('codeInput').value;
            const language = document.getElementById('codeLanguage').value;
            if (!code) { alert('Please paste some code first!'); return; }
            const btn = document.querySelector('.btn');
            btn.textContent = '⏳ ANALYZING...';
            btn.disabled = true;
            const res = await fetch(`/api/coderisk/analyze?code=${encodeURIComponent(code)}&language=${language}`, { method: 'POST' });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('riskText').textContent = text;
            document.getElementById('codeRiskResult').style.display = 'block';
            btn.textContent = '🔮 ANALYZE RISKS';
            btn.disabled = false;
        }
    </script>
</body>
</html>
