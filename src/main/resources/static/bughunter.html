<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevArena - Bug Hunter</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --card: rgba(255,255,255,0.03);
            --border: rgba(0,255,136,0.2);
            --green: #00ff88;
            --cyan: #00d4ff;
            --red: #ff4466;
            --yellow: #ffd700;
            --text: #e2e8f0;
            --muted: #4a5568;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100vh; }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.08; pointer-events: none; }
        .orb1 { width: 400px; height: 400px; background: var(--green); top: -100px; left: -100px; }
        .orb2 { width: 300px; height: 300px; background: var(--cyan); bottom: -100px; right: -100px; }

        .navbar {
            position: relative; z-index: 10;
            background: rgba(8,12,20,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; background: linear-gradient(135deg, var(--cyan), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        .back-btn { padding: 7px 16px; background: transparent; border: 1px solid var(--border); color: var(--green); border-radius: 6px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 2px; transition: all 0.3s; }
        .back-btn:hover { background: var(--green); color: #000; }

        .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 50px 20px; }
        .page-header { margin-bottom: 36px; }
        .page-tag { font-size: 0.65rem; letter-spacing: 4px; color: var(--green); text-transform: uppercase; margin-bottom: 10px; }
        .page-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; }
        .page-sub { color: var(--muted); font-size: 0.8rem; margin-top: 8px; }

        .stats-bar { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; flex: 1; text-align: center; }
        .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--green); font-weight: 700; }
        .stat-label { font-size: 0.65rem; letter-spacing: 2px; color: var(--muted); margin-top: 4px; text-transform: uppercase; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 32px; backdrop-filter: blur(10px); }
        .problem-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .problem-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--green); letter-spacing: 1px; }
        .difficulty-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; border: 1px solid var(--green); color: var(--green); }

        .problem-desc { color: var(--muted); font-size: 0.82rem; margin-bottom: 20px; line-height: 1.7; }

        .code-block {
            background: #0a0e1a;
            border: 1px solid rgba(0,255,136,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            line-height: 1.8;
            color: #a8ff78;
            overflow-x: auto;
            white-space: pre;
        }

        .input-label { font-size: 0.65rem; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,255,136,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 16px;
        }
        input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,255,136,0.1); }
        input::placeholder { color: var(--muted); }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 11px 22px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 2px; font-weight: 700; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, var(--green), #00aa55); color: #000; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        .btn-hint { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }
        .btn-hint:hover { background: var(--cyan); color: #000; }
        .btn-next { background: transparent; border: 1px solid var(--muted); color: var(--muted); }
        .btn-next:hover { border-color: var(--text); color: var(--text); }

        .result { margin-top: 20px; padding: 16px 20px; border-radius: 10px; font-size: 0.85rem; display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .success { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
        .error { background: rgba(255,68,102,0.08); border: 1px solid rgba(255,68,102,0.3); color: var(--red); }
        .hint { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.3); color: var(--cyan); }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <nav class="navbar">
        <div class="logo" onclick="window.location.href='/dashboard.html'">DEVARENA</div>
        <button class="back-btn" onclick="window.location.href='/dashboard.html'">← BACK</button>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="page-tag">// Module 01</div>
            <div class="page-title">🐛 BUG HUNTER</div>
            <div class="page-sub">Find the bug. Earn points. Level up.</div>
        </div>

        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="userScore">0</div>
                <div class="stat-label">Total Score</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="problemCategory">-</div>
                <div class="stat-label">Category</div>
            </div>
        </div>

        <div class="card">
            <div class="problem-header">
                <div class="problem-title" id="problemTitle">Loading...</div>
                <div class="difficulty-badge" id="problemDifficulty">Easy</div>
            </div>
            <div class="problem-desc" id="problemDescription"></div>
            <div class="code-block" id="problemCode"></div>
            <label class="input-label">Your Answer</label>
            <input type="text" id="userAnswer" placeholder="describe the bug..." />
            <div class="btn-group">
                <button class="btn btn-primary" onclick="submitAnswer()">✓ SUBMIT</button>
                <button class="btn btn-hint" onclick="getHint()">💡 HINT</button>
                <button class="btn btn-next" onclick="loadProblem()">⏭ NEXT</button>
            </div>
            <div class="result" id="answerResult"></div>
        </div>
    </div>

    <script>
        const loggedInUser = localStorage.getItem('loggedInUser');
        if (!loggedInUser) window.location.href = '/index.html';
        let currentProblemId = null;

        async function loadProblem() {
            document.getElementById('problemTitle').textContent = 'Loading...';
            document.getElementById('problemCode').textContent = '';
            document.getElementById('userAnswer').value = '';
            document.getElementById('answerResult').style.display = 'none';
            const res = await fetch(`/api/problems/random?username=${loggedInUser}`);
            const problem = await res.json();
            currentProblemId = problem.id;
            document.getElementById('problemTitle').textContent = problem.title;
            document.getElementById('problemDescription').textContent = problem.bugDescription || '';
            document.getElementById('problemCode').textContent = problem.buggyCode || '';
            document.getElementById('problemDifficulty').textContent = problem.difficulty || 'Easy';
            document.getElementById('problemCategory').textContent = problem.category || '-';
            loadScore();
        }

        async function loadScore() {
            const res = await fetch(`/api/users/profile/${loggedInUser}`);
            const user = await res.json();
            document.getElementById('userScore').textContent = user.score || 0;
        }

        async function submitAnswer() {
            const answer = document.getElementById('userAnswer').value;
            if (!answer) return;
            const res = await fetch(`/api/problems/check?problemId=${currentProblemId}&userAnswer=${encodeURIComponent(answer)}&username=${loggedInUser}`, { method: 'POST' });
            const text = await res.text();
            showResult('answerResult', text, text.includes('Correct'));
            if (text.includes('Correct')) loadScore();
        }

        async function getHint() {
            const res = await fetch(`/api/problems/${currentProblemId}`);
            const problem = await res.json();
            showResult('answerResult', '💡 ' + problem.hint, null);
        }

        function showResult(id, msg, success) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'result ' + (success === null ? 'hint' : success ? 'success' : 'error');
            el.style.display = 'block';
        }

        loadProblem();
    </script>
</body>
</html>
