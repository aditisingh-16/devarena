<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevArena ⚔️</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c14;
            --card: rgba(255,255,255,0.03);
            --border: rgba(0,212,255,0.2);
            --cyan: #00d4ff;
            --green: #00ff88;
            --red: #ff4466;
            --text: #e2e8f0;
            --muted: #4a5568;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }

        /* Glow orbs */
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 8s ease-in-out infinite; }
        .orb1 { width: 400px; height: 400px; background: var(--cyan); top: -100px; left: -100px; }
        .orb2 { width: 300px; height: 300px; background: var(--green); bottom: -50px; right: -50px; animation-delay: -4s; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        .wrapper { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }

        .logo-section { text-align: center; margin-bottom: 40px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 900; letter-spacing: 4px; background: linear-gradient(135deg, var(--cyan), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-sub { color: var(--muted); font-size: 0.75rem; letter-spacing: 6px; text-transform: uppercase; margin-top: 8px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,212,255,0.05), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .tabs { display: flex; margin-bottom: 28px; border-bottom: 1px solid var(--border); gap: 4px; }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: var(--muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab:hover { color: var(--cyan); }
        .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { position: relative; margin-bottom: 16px; }
        .input-label { font-size: 0.7rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,212,255,0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: all 0.3s;
            outline: none;
        }
        input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
        input::placeholder { color: var(--muted); }

        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--cyan), #0088aa);
            border: none;
            border-radius: 8px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.3); }
        .btn:active { transform: translateY(0); }

        .message { margin-top: 14px; padding: 10px 14px; border-radius: 8px; font-size: 0.8rem; display: none; }
        .success { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: var(--green); }
        .error { background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.3); color: var(--red); }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <div class="wrapper">
        <div class="logo-section">
            <div class="logo">DEVARENA</div>
            <div class="logo-sub">The Ultimate Developer Battleground</div>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="showTab('login', this)">LOGIN</div>
                <div class="tab" onclick="showTab('register', this)">REGISTER</div>
            </div>

            <div class="section active" id="login">
                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="text" id="loginUsername" placeholder="enter username..." />
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="loginPassword" placeholder="enter password..." />
                </div>
                <button class="btn" onclick="login()">ENTER ARENA</button>
                <div class="message" id="loginMessage"></div>
            </div>

            <div class="section" id="register">
                <div class="input-group">
                    <label class="input-label">Username</label>
                    <input type="text" id="regUsername" placeholder="choose username..." />
                </div>
                <div class="input-group">
                    <label class="input-label">Email</label>
                    <input type="email" id="regEmail" placeholder="your email..." />
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" id="regPassword" placeholder="create password..." />
                </div>
                <button class="btn" onclick="register()">CREATE ACCOUNT</button>
                <div class="message" id="registerMessage"></div>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            el.classList.add('active');
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            if (!username || !password) { showMessage('loginMessage', '⚠ Fill all fields!', false); return; }
            const res = await fetch(`/api/users/login?username=${username}&password=${password}`, { method: 'POST' });
            const data = await res.text();
            if (data.includes('successful')) {
                localStorage.setItem('loggedInUser', username);
                window.location.href = '/dashboard.html';
            } else {
                showMessage('loginMessage', '✗ ' + data, false);
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if (!username || !email || !password) { showMessage('registerMessage', '⚠ Fill all fields!', false); return; }
            const res = await fetch(`/api/users/register?username=${username}&email=${email}&password=${password}`, { method: 'POST' });
            const data = await res.text();
            showMessage('registerMessage', data, data.includes('successful'));
        }

        function showMessage(id, msg, success) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'message ' + (success ? 'success' : 'error');
            el.style.display = 'block';
        }
    </script>
</body>
</html>
